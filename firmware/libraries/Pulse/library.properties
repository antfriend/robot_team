sentence=Fleet pulse time-base and conductor election for the robot_team band (TTN-RFC-0010).
paragraph=A transport-agnostic engine for a self-synchronizing ~1 Hz heartbeat: a shared pulse clock (millis() plus an adopted offset), first-up-conducts / lowest-id-keeps election with era-numbered handoff, drift-paced PULSE beacons (no per-beat traffic), and a beat-boundary detector. The sketch supplies the transport (Toot.h PULSE codec) and the instrument; the ~50 ms tolerance is musical swing.
